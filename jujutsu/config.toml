# Jujutsu Config
# https://jj-vcs.github.io/jj/latest/config/
# Edited: Mar 15, 2026

[user]
name  = "Brajeshwar Oinam"
email = "brajeshwar@oinam.com"

# --------------------------------------
# UI
# --------------------------------------

[ui]
editor          = "vim"
color           = "auto"
pager           = ":builtin"
default-command = "log"   # bare `jj` shows the log

# --------------------------------------
# Signing (mirrors git gpgsign = true)
# --------------------------------------

[signing]
sign-all = true
backend  = "gpg"
key      = "47EE96D63DFDA9372079337A9C9CD08302E7C29F"

# --------------------------------------
# Git backend
# --------------------------------------

[git]
# Don't auto-create local bookmarks for every remote branch
auto-local-bookmark = false
# Prefix for bookmarks auto-created on push
push-bookmark-prefix = "push-"

# --------------------------------------
# Aliases — mirrors intent of gitconfig aliases
# --------------------------------------

[aliases]
s     = ["status"]
lg    = ["log", "-r", "all()", "--template", "builtin_log_compact"]
fo    = ["git", "fetch", "--all-remotes"]
pushm = ["git", "push", "--remote", "origin"]
amend = ["describe"]
n     = ["new"]
sq    = ["squash"]
c     = ["commit", "-m"]
