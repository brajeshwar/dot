# Jujutsu Config
# https://jj-vcs.github.io/jj/latest/config/
# Edited: Mar 15, 2026

[user]
name  = "Brajeshwar Oinam"
email = "brajeshwar@oinam.com"

# --------------------------------------
# UI
# --------------------------------------

[ui]
editor          = "vim"
color           = "auto"
pager           = ":builtin"
default-command = "log"   # bare `jj` shows the log

# --------------------------------------
# Signing (mirrors git gpgsign = true)
# --------------------------------------

[signing]
sign-all = true
backend  = "gpg"
key      = "47EE96D63DFDA9372079337A9C9CD08302E7C29F"

# --------------------------------------
# Git backend
# --------------------------------------

[git]
# Don't auto-create local bookmarks for every remote branch
auto-local-bookmark = false
# Prefix for bookmarks auto-created on push
push-bookmark-prefix = "push-"

# --------------------------------------
# Aliases — mirrors intent of gitconfig aliases
# --------------------------------------

[aliases]
s     = ["status"]                                              # jj s               — working copy status
lg    = ["log", "-r", "all()", "--template", "builtin_log_compact"] # jj lg          — full repo log, compact view
fo    = ["git", "fetch", "--all-remotes"]                      # jj fo              — fetch from all remotes
pushm = ["git", "push", "--remote", "origin"]                  # jj pushm           — push bookmarks to origin
amend = ["describe"]                                           # jj amend -m "msg"  — reword current change (no new commit)
n     = ["new"]                                                # jj n               — new empty child change (like git checkout -b)
sq    = ["squash"]                                             # jj sq              — squash change into its parent
c     = ["commit", "-m"]                                       # jj c "msg"         — describe + auto-open new child (like git add -A && git commit -m)
bm    = ["bookmark", "set", "main", "-r", "@-"]                # jj bm              — move main bookmark to latest commit (@- = parent of empty working copy)
