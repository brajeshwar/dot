# Personal global mise config — fallback tool versions used outside any
# project that has its own mise.toml (which takes precedence per-directory).
# Symlinked to ~/.config/mise/config.toml by bootstrap.sh.
# Edited: Jul 1, 2026

# Example — uncomment and adjust as needed:
# [tools]
# node = "lts"
# python = "3.12"
# ruby = "3.3"

[settings]
# Don't auto-warn about missing idiomatic version files (.nvmrc, .ruby-version, etc.)
# unless you want mise to pick those up too.
idiomatic_version_file_enable_tools = []
